<!DOCTYPE html>
<html>
<head>
  <title>Mission Possible</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; margin: 5px; max-width: 480px; margin:auto; }
    h2 { text-align: center; }

    .activity {
      display: flex;
      align-items: center;
      margin: 5px 0;
      font-size: 18px;
    }

    .activity label { margin-left: 10px; }

    .activity button {
      margin-left: auto;
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 5px 8px;
    }

    .progress-container {
      margin: 8px 0;
      height: 25px;
      width: 100%;
      background: #eee;
      border-radius: 12px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 12px;
      text-align: center;
      color: white;
      font-weight: bold;
    }

    button, input {
      margin: 3px;
      padding: 10px;
      font-size: 16px;
    }

    #tabs { text-align: center; margin-bottom: 5px; }

    .week-box {
      border: 1px solid #ccc;
      margin: 5px 0;
      padding: 5px;
      border-radius: 5px;
      background: #f9f9f9;
    }

    #activities {
      overflow-y: auto;
      max-height: 50vh;
    }

    body.dark { background: #121212; color: white; }
    body.dark .progress-container { background: #333; }
    body.dark .week-box { background: #1e1e1e; }
  </style>
</head>
<body>

<h2>Mission Possible</h2>

<div style="text-align:center;">
  <button id="darkModeBtn">🌙 Dark Mode</button>
</div>

<div id="tabs">
  <button id="tabTracker">Tracker</button>
  <button id="tabLog">Weekly Log</button>
</div>

<div id="trackerDiv">

  <div style="text-align:center;">
    <button id="prevDay">◀</button>
    <span id="dayLabel"></span>
    <button id="nextDay">▶</button>
  </div>

  <div style="text-align:center;">
    <input type="text" id="newActivity" placeholder="Tambah aktivitas">
    <button id="addActivity">Tambah</button>
  </div>

  <div id="activities"></div>

  <div class="progress-container">
    <div id="progressBar" class="progress-bar">0%</div>
  </div>

  <p style="text-align:center;" id="targetText"></p>

</div>

<div id="weeklyLogContainer" style="display:none;"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {

  let activitiesList = JSON.parse(localStorage.getItem('activitiesList')) || [
    "Solat Subuh",
    "Solat Dzuhur",
    "Solat Ashar",
    "Solat Maghrib",
    "Solat Isya",

    "Sikat Gigi Pagi",
    "Sikat Gigi Malam",
    "Minum Air Putih 2 Liter",
    "Olahraga 10 Menit",

    "Baca Buku 10 Menit",
    "No PMO",

    "Makan Pagi",
    "Makan Siang",
    "Makan Malam"
  ];

  let currentDay = parseInt(localStorage.getItem('currentDay')) || 1;
  const totalDays = 7;

  let savedData = JSON.parse(localStorage.getItem('dailyTracker')) || {};

  let weeklyLog;
  try {
    weeklyLog = JSON.parse(localStorage.getItem('weeklyLog')) || [];
  } catch {
    weeklyLog = [];
  }

  if(localStorage.getItem('darkMode') === 'true'){
    document.body.classList.add('dark');
  }

  const activitiesDiv = document.getElementById('activities');
  const progressBar = document.getElementById('progressBar');
  const dayLabel = document.getElementById('dayLabel');
  const targetText = document.getElementById('targetText');
  const weeklyContainer = document.getElementById('weeklyLogContainer');

  function renderDay(day){
    activitiesDiv.innerHTML = '';
    dayLabel.textContent = `Day ${day}`;

    activitiesList.forEach(act=>{
      let div = document.createElement('div');
      div.className='activity';

      let checkbox = document.createElement('input');
      checkbox.type='checkbox';
      checkbox.checked = savedData[`${day}-${act}`] || false;

      checkbox.onchange = ()=>{
        savedData[`${day}-${act}`]=checkbox.checked;
        localStorage.setItem('dailyTracker',JSON.stringify(savedData));
        updateProgress(day);
      };

      let label=document.createElement('label');
      label.textContent=act;

      let deleteBtn = document.createElement('button');
      deleteBtn.textContent = "❌";

      deleteBtn.onclick = ()=>{
        if(confirm("Hapus aktivitas?")){
          activitiesList = activitiesList.filter(a=>a!==act);
          localStorage.setItem('activitiesList',JSON.stringify(activitiesList));
          renderDay(currentDay);
        }
      };

      div.appendChild(checkbox);
      div.appendChild(label);
      div.appendChild(deleteBtn);
      activitiesDiv.appendChild(div);
    });

    updateProgress(day);
  }

  function updateProgress(day){
    if(activitiesList.length === 0){
      progressBar.style.width='0%';
      progressBar.textContent='0%';
      return;
    }

    let done=0;
    activitiesList.forEach(act=>{
      if(savedData[`${day}-${act}`]) done++;
    });

    let percent=Math.round(done/activitiesList.length*100);

    progressBar.style.width=percent+'%';
    progressBar.textContent=percent+'%';
    progressBar.style.background =
      percent<50?'red':
      percent<80?'orange':'green';

    targetText.textContent =
      percent>=80 ? "🔥 Target tercapai!" : "💪 Kejar minimal 80%!";
  }

  function saveAndResetWeek(){
    let weekData={};

    for(let d=1;d<=7;d++){
      weekData[`Day ${d}`]={};
      activitiesList.forEach(act=>{
        weekData[`Day ${d}`][act]=savedData[`${d}-${act}`]||false;
      });
    }

    weeklyLog.push(weekData);
    localStorage.setItem('weeklyLog',JSON.stringify(weeklyLog));

    savedData={};
    localStorage.setItem('dailyTracker',JSON.stringify(savedData));
  }

  function renderWeeklyLog(){
    weeklyContainer.innerHTML = `
      <div style="text-align:center;">
        <button id="exportExcel">📥 Export Excel</button>
        <button id="resetWeeklyLog">🗑 Reset Log</button>
      </div>
    `;

    if(weeklyLog.length===0){
      weeklyContainer.innerHTML += "<p style='text-align:center;'>Belum ada data</p>";
      return;
    }

    weeklyLog.forEach((week,idx)=>{
      let box=document.createElement('div');
      box.className='week-box';
      box.innerHTML=`<h4>Minggu ${idx+1}</h4>`;

      for(let d=1;d<=7;d++){
        let row=`<strong>Day ${d}:</strong> `;
        activitiesList.forEach(act=>{
          let val = week[`Day ${d}`]?.[act] || false;
          row += val ? "✅ " : "❌ ";
        });
        box.innerHTML+=row+"<br>";
      }

      weeklyContainer.appendChild(box);
    });
  }

  weeklyContainer.addEventListener('click', (e)=>{

    if(e.target.id === 'resetWeeklyLog'){
      if(confirm("Hapus semua log?")){
        weeklyLog=[];
        localStorage.removeItem('weeklyLog');
        renderWeeklyLog();
      }
    }

    if(e.target.id === 'exportExcel'){
      if(weeklyLog.length===0){
        alert("Tidak ada data!");
        return;
      }

      let csv = "\uFEFFMinggu,Hari," + activitiesList.join(",") + "\n";

      weeklyLog.forEach((week,i)=>{
        for(let d=1;d<=7;d++){
          let row=[`Minggu ${i+1}`,`Day ${d}`];
          activitiesList.forEach(act=>{
            row.push(week[`Day ${d}`]?.[act]?"1":"0");
          });
          csv+=row.join(",")+"\n";
        }
      });

      let link=document.createElement("a");
      link.href=encodeURI("data:text/csv;charset=utf-8,"+csv);
      link.download="habit_tracker.csv";
      link.click();
    }

  });

  document.getElementById('addActivity').onclick=()=>{
    let val=document.getElementById('newActivity').value;
    if(val && !activitiesList.includes(val)){
      activitiesList.push(val);
      localStorage.setItem('activitiesList',JSON.stringify(activitiesList));
      document.getElementById('newActivity').value="";
      renderDay(currentDay);
    }
  };

  document.getElementById('darkModeBtn').onclick=()=>{
    document.body.classList.toggle('dark');
    localStorage.setItem('darkMode',document.body.classList.contains('dark'));
  };

  document.getElementById('prevDay').onclick=()=>{
    currentDay=(currentDay-2+7)%7+1;
    localStorage.setItem('currentDay',currentDay);
    renderDay(currentDay);
  };

  document.getElementById('nextDay').onclick=()=>{
    if(currentDay===7){
      saveAndResetWeek();
      currentDay=1;
      alert("Minggu selesai!");
    } else currentDay++;

    localStorage.setItem('currentDay',currentDay);
    renderDay(currentDay);
  };

  tabTracker.onclick=()=>{
    trackerDiv.style.display='block';
    weeklyContainer.style.display='none';
  };

  tabLog.onclick=()=>{
    trackerDiv.style.display='none';
    weeklyContainer.style.display='block';
    renderWeeklyLog();
  };

  renderDay(currentDay);

});
</script>

</body>
</html>
